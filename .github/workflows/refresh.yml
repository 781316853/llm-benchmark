name: 每日数据刷新与部署
on:
  schedule:
    - cron: "0 23 * * *"   # UTC 23:00 = 北京次日 07:00
  workflow_dispatch:       # 支持手动触发验证
  push:                    # 推送代码变更时触发部署
    branches: [main]       # 仅监听 main 分支
    paths-ignore:          # 排除以下路径,避免机器人提交 data/*.js 触发循环
      - "data/**"
      - ".github/**"
      - "*.md"

permissions:
  contents: write          # 允许把刷新后的 data/*.js 提交回仓库
  pages: write             # 允许部署到 GitHub Pages
  id-token: write          # Pages 部署所需的 OIDC 令牌

# 注意:不在顶层设置单一 concurrency 组。
# 历史上 refresh 与 deploy 共用 group=refresh-data,一旦定时刷新的 job 卡死在
# queued(如 2026-07-20 故障),连 push 触发的部署也会被同一把锁阻塞。
# 现改为在 refresh / deploy 各自 job 上单独控制并发(见下方注释)。

jobs:
  refresh:
    # 仅定时/手动触发时抓取数据;push 事件跳过(只部署,不重复刷新)
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15   # 兜底:防止数据抓取卡死而长期占用并发锁
    # refresh 单独成组:只限制多个刷新之间串行(避免并发改写 data/*),
    # 新的刷新会抢占旧的卡死 run,确保锁不会无限期被占用。
    concurrency:
      group: refresh-data
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true   # 确保 git push 有 GITHUB_TOKEN 凭据

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖(p-limit + p-retry)
        # 用 npm install(非 ci):首次运行时仓库尚无 package-lock.json,
        # npm install 会生成它并安装依赖;之后可切回 npm ci 获得可复现构建。
        run: npm install --no-audit --no-fund

      - name: 抓取多源数据并重写 data/*.js
        run: node scripts/fetch_all.js

      - name: 提交变更(若有)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.js
          if git diff --staged --quiet; then
            echo "数据无变化,跳过提交"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(data): 每日刷新 $(date -u +%F)"
            git push origin HEAD:${{ github.ref_name }}
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  # 部署阶段:重新拉取最新代码后部署,确保线上与提交一致
  # needs refresh 但允许 refresh 被跳过(push 事件时直接部署)
  deploy:
    if: always()
    needs: refresh
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # deploy 不进任何 concurrency 组:GitHub Pages 的 environment=github-pages
    # 本身就保证同一环境同时只有一个部署,无需额外的 workflow 级锁。
    # 这样即便 refresh 的 job 卡死,部署也不会被它连带阻塞。
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # 拉取默认分支最新提交(含 refresh 刚推送的数据),否则默认检出工作流触发时的旧 commit

      - name: 配置 GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: 上传站点产物(整个静态站点:index.html + css + js + data)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 清除 jsDelivr CDN 缓存(使 CDN 节点即时更新)
        if: always()
        env:
          BR: ${{ github.ref_name }}
        run: |
          for f in index.html data/deepswe.js data/deepswe_v10.js data/vibecode.js data/llm2014.js data/aaci.js data/models.js data/seen.js data/quality.js data/swebench.js data/aider.js data/livecode.js data/datalearner.js; do
            curl -fsSL "https://purge.jsdelivr.net/gh/${{ github.repository }}@${BR}/$f" || true
          done
